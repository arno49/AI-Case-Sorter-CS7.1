[platformio]
src_dir = ArduinoCode/CS71_Arduino

[env:uno]
platform = atmelavr@5.3.0
board = uno
framework = arduino
build_flags = -D PROTOCOL_V2_ENABLED=0

[env:uno_v2]
platform = atmelavr@5.3.0
board = uno
framework = arduino
build_flags = -D PROTOCOL_V2_ENABLED=1

[env:native]
platform = native@1.2.1
build_src_filter =
  -<*>
  +<logic.cpp>
  +<command_parser.cpp>
  +<protocol.cpp>
  +<machine_state.cpp>
  +<runtime_timer.cpp>
  +<feed_completion.cpp>
  +<proximity_settler.cpp>
  +<step_sequence.cpp>
test_build_src = true
test_framework = unity

[env:native_v2]
extends = env:native
build_flags = -D PROTOCOL_V2_ENABLED=1
test_filter = test_protocol_v2_session
